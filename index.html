<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parc Eòlic – Repotenciació</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: transparent; }
  .gadget {
    background: linear-gradient(180deg, #b8d8f0 0%, #d4ecf7 35%, #8fbc8f 60%, #5a8a5a 100%);
    border-radius: 16px; overflow: hidden; position: relative; width: 100%;
  }
  .sky-area { position: relative; height: clamp(220px, 40vw, 320px); overflow: hidden; }
  .cloud { position: absolute; background: rgba(255,255,255,0.75); border-radius: 50px; animation: drift linear infinite; }
  @keyframes drift { 0%{transform:translateX(-150px)} 100%{transform:translateX(110vw)} }
  .title-bar { position: absolute; top: 10px; left: 0; right: 0; text-align: center; pointer-events: none; padding: 0 10px; }
  .park-name { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(15px, 3.5vw, 22px); font-weight: 700; color: #1a3a5c; text-shadow: 0 1px 3px rgba(255,255,255,0.7); letter-spacing: 1px; }
  .park-status { font-size: clamp(10px, 2vw, 12px); font-weight: 500; color: #2d6a9f; letter-spacing: 2px; text-transform: uppercase; }
  .windmills-container { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: flex-end; justify-content: space-around; padding: 0 8px; }
  .windmill { display: flex; flex-direction: column; align-items: center; flex-shrink: 1; }
  .turbine-svg { display: block; }
  .blade { animation: spin linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .battery-bank {
    position: absolute; bottom: 6px; right: 10px; z-index: 5;
    display: flex; align-items: flex-end; gap: 5px;
    padding: 7px 9px; background: rgba(18,38,18,0.30); border-radius: 10px;
    opacity: 0; transform: translateY(10px); transition: opacity .6s ease, transform .6s ease;
    pointer-events: none;
  }
  .battery-bank.show { opacity: 1; transform: translateY(0); }
  .battery { position: relative; width: 15px; height: 30px; border: 2px solid #d8f5d8; border-radius: 3px; background: rgba(255,255,255,0.12); overflow: hidden; }
  .battery::before { content:''; position:absolute; top:-5px; left:50%; transform:translateX(-50%); width:7px; height:4px; background:#d8f5d8; border-radius:2px 2px 0 0; }
  .battery .charge { position:absolute; bottom:0; left:0; right:0; height:0; background:linear-gradient(180deg,#2ecc71,#27ae60); animation: charge 1.2s ease forwards; }
  @keyframes charge { to { height: 82%; } }
  .battery-label { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; color:#eaffea; align-self:center; margin-left:3px; white-space:nowrap; }

  .ground-strip { background: linear-gradient(180deg, #5a8a5a, #3d6b3d); padding: clamp(10px,2vw,16px) clamp(10px,3vw,24px) clamp(8px,2vw,12px); display: flex; justify-content: space-between; gap: clamp(6px,2vw,12px); }
  .data-panel { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: clamp(7px,2vw,10px) clamp(8px,2vw,14px); flex: 1; min-width: 0; transition: all 0.8s ease; }
  .data-panel.repowered-panel { background: rgba(255,220,60,0.2); border-color: rgba(255,220,60,0.6); }
  .panel-label { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(9px,2vw,11px); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-bottom: 5px; }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; gap: 4px; }
  .stat-key { font-size: clamp(9px,1.8vw,11px); color: rgba(255,255,255,0.85); white-space: nowrap; }
  .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(13px,3vw,16px); font-weight: 700; color: #fff; transition: all 0.5s ease; white-space: nowrap; }
  .stat-value.highlight { color: #ffe040; text-shadow: 0 0 8px rgba(255,220,60,0.5); }

  .econ-footer { background: #3d6b3d; color: rgba(255,255,255,0.88); font-family:'Barlow Condensed',sans-serif; font-size: clamp(10px,2.3vw,13px); letter-spacing:0.5px; text-align:center; padding: 2px 12px 8px; }

  .park-selector { display: flex; gap: 6px; padding: clamp(8px,2vw,12px) clamp(10px,3vw,24px) 0; background: #3d6b3d; flex-wrap: wrap; justify-content: center; }
  .park-btn { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(10px,2.2vw,12px); font-weight: 600; letter-spacing: 1px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); border-radius: 20px; padding: 5px clamp(8px,2vw,12px); color: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.2s; }
  .park-btn.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.6); color: #fff; }
  .btn-area { padding: clamp(10px,2vw,16px) 24px; background: #3d6b3d; text-align: center; position: relative; }
  .repow-btn { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(13px,3vw,17px); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; border: none; border-radius: 40px; padding: clamp(10px,2vw,13px) clamp(20px,5vw,36px); cursor: pointer; box-shadow: 0 4px 16px rgba(39,174,96,0.45); transition: all 0.2s ease; position: relative; overflow: hidden; max-width: 100%; }
  .repow-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(39,174,96,0.55); }
  .repow-btn:active:not(:disabled) { transform: scale(0.97); }
  .repow-btn:disabled { background: linear-gradient(135deg,#7f8c8d,#636e72); cursor:default; box-shadow:none; }
  .spark { position: absolute; top:50%; left:50%; width:0; height:0; background: rgba(255,255,255,0.35); border-radius: 50%; transform: translate(-50%,-50%); animation: sparkle 0.5s ease-out forwards; }
  @keyframes sparkle { to { width:300px; height:300px; opacity:0; } }

  .credits-footer { background:#2f5530; display:flex; align-items:center; justify-content:flex-end; gap:12px; padding:10px clamp(12px,3vw,24px); }
  .logo-link { flex-shrink:0; line-height:0; display:block; }
  .naci-logo { width:40px; height:40px; border-radius:8px; display:block; }
  .credits-text { display:flex; flex-direction:column; gap:2px; min-width:0; text-align:right; }
  .credit-line { font-family:'Barlow',sans-serif; font-size:clamp(10px,2.1vw,12px); color:rgba(255,255,255,0.72); line-height:1.35; }
  .credit-line strong { font-weight:700; color:rgba(255,255,255,0.95); }
  .credit-line a { color:rgba(255,255,255,0.95); text-decoration:underline; text-underline-offset:2px; }
  .credit-line a:hover { color:#fff; }
  .credit-line.sources { color:rgba(255,255,255,0.62); }
</style>
</head>
<body>

<div class="gadget">
  <div class="sky-area">
    <div id="clouds"></div>
    <div class="title-bar">
      <div class="park-name" id="park-name">Colladetes (Baix Ebre)</div>
      <div class="park-status" id="park-status">En funcionament</div>
    </div>
    <div class="windmills-container" id="windmills"></div>
    <div class="battery-bank" id="battery-bank"></div>
  </div>

  <div class="ground-strip">
    <div class="data-panel" id="panel-orig">
      <div class="panel-label">Actual</div>
      <div class="stat-row"><span class="stat-key">Aerogeneradors</span><span class="stat-value" id="val-aero-orig">—</span></div>
      <div class="stat-row"><span class="stat-key">Potència</span><span class="stat-value" id="val-pot-orig">—</span></div>
      <div class="stat-row"><span class="stat-key">Producció</span><span class="stat-value" id="val-prod-orig">—</span></div>
    </div>
    <div class="data-panel" id="panel-new" style="opacity:0.4;transition:opacity 0.8s;">
      <div class="panel-label">⚡ Repotenciat</div>
      <div class="stat-row"><span class="stat-key">Aerogeneradors</span><span class="stat-value" id="val-aero-new">—</span></div>
      <div class="stat-row"><span class="stat-key">Potència</span><span class="stat-value" id="val-pot-new">—</span></div>
      <div class="stat-row"><span class="stat-key">Producció</span><span class="stat-value" id="val-prod-new">—</span></div>
      <div class="stat-row" id="row-emm-new" style="display:none"><span class="stat-key">Emmagatzematge</span><span class="stat-value" id="val-emm-new">—</span></div>
    </div>
  </div>

  <div class="econ-footer" id="econ-footer" style="display:none"></div>

  <div class="park-selector" id="park-selector"></div>

  <div class="btn-area">
    <button class="repow-btn" id="repow-btn" onclick="repotencia(event)">⚡ CLICA AQUÍ PER REPOTENCIAR EL PARC EÒLIC</button>
  </div>

  <div class="credits-footer">
    <a class="logo-link" href="https://naciodigital.cat/impacte/energies-renovables" target="_blank" rel="noopener" aria-label="Nació · Impacte">

      <div class="credit-line"><strong>Elaboració:</strong> <a href="https://www.linkedin.com/in/arnau-urgell-vidal" target="_blank" rel="noopener">Arnau Urgell i Vidal</a> / <a href="https://naciodigital.cat/impacte/energies-renovables" target="_blank" rel="noopener">Nació</a></div>
      <div class="credit-line sources"><strong>Fonts:</strong> EolicCat, IDAE i DG Energia</div>
    </div>

</div>

<script>
const parks = [
  { name:"Colladetes (Baix Ebre)", short:"Colladetes", status:"En funcionament",
    orig:{ aero:54, pot:"36,6 MW", prod:"74 GWh" },
    rep: { aero:8,  pot:"48 MW",   prod:"133 GWh" } },
  { name:"Trucafort (Priorat)", short:"Trucafort", status:"En tramitació",
    orig:{ aero:91, pot:"30 MW",   prod:"60 GWh" },
    rep: { aero:7,  pot:"29,85 MW",prod:"75 GWh" } },
  { name:"Parc eòlic del Baix Ebre (Baix Ebre)", short:"Pebesa", status:"En tramitació",
    orig:{ aero:25, pot:"4,05 MW", prod:"3,9 GWh" },
    rep: { aero:3,  pot:"4,5 MW",  prod:"15,9 GWh" } },
  { name:"Mudèfer I (Terra Alta)", short:"Mudèfer I", status:"En tramitació",
    orig:{ aero:25, pot:"45 MW",   prod:"90 GWh" },
    rep: { aero:10, pot:"45 MW",   prod:"112,5 GWh", emm:"22,5 MWh", emmVal:22.5, cost:"65,25 M€", subv:"8,95 M€" } },
  { name:"Mudèfer II (Terra Alta)", short:"Mudèfer II", status:"En tramitació",
    orig:{ aero:7,  pot:"12,6 MW", prod:"25,2 GWh" },
    rep: { aero:3,  pot:"12,6 MW", prod:"31,5 GWh", emm:"6,3 MWh", emmVal:6.3, cost:"18,27 M€", subv:"2,5 M€" } },
  { name:"Veciana (Anoia)", short:"Veciana", status:"En tramitació",
    orig:{ aero:18, pot:"30,06 MW", prod:"60,12 GWh" },
    rep: { aero:7,  pot:"30,06 MW", prod:"75,15 GWh", emmVal:0, cost:"39,1 M€", subv:"2,61 M€" } },
  { name:"Alta Anoia (Anoia)", short:"Alta Anoia", status:"En tramitació",
    orig:{ aero:15, pot:"28 MW",    prod:"56 GWh" },
    rep: { aero:7,  pot:"28 MW",    prod:"70 GWh", emm:"14 MWh", emmVal:14, cost:"40,6 M€", subv:"5,6 M€" } },
  { name:"Catalunya 2030", short:"Catalunya 2030", status:"En projecte",
    orig:{ aero:762, pot:"1.235,8 MW", prod:"2.470 GWh" },
    rep: { aero:242, pot:"1.297,6 MW", prod:"3.244 GWh" } }
];

let current = 0, repowered = false;
const layoutCache = {};

function makeClouds() {
  const c = document.getElementById('clouds');
  c.innerHTML = '';
  [{w:90,h:28,top:18,left:'10%',dur:30},{w:60,h:20,top:42,left:'55%',dur:40},
   {w:110,h:32,top:8,left:'32%',dur:48},{w:70,h:22,top:58,left:'78%',dur:34}]
  .forEach(cf => {
    const d = document.createElement('div');
    d.className = 'cloud';
    d.style.cssText = `width:${cf.w}px;height:${cf.h}px;top:${cf.top}px;left:${cf.left};animation-duration:${cf.dur}s;animation-delay:-${Math.random()*20}s`;
    c.appendChild(d);
  });
}

function turbineSVG(w, h, spd) {
  const cx = w/2, mastW = Math.max(3, w*0.10);
  const hubY = h * 0.30;
  const bladeL = Math.min(w*0.55, h*0.30);
  return `<svg class="turbine-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <rect x="${cx-mastW/2}" y="${hubY}" width="${mastW}" height="${h-hubY}" rx="2" fill="#e8e0d0" stroke="#c0b8a8" stroke-width="0.5"/>
    <circle cx="${cx}" cy="${hubY}" r="${Math.max(3,w*0.07)}" fill="#d0c8b8" stroke="#b0a898" stroke-width="0.5"/>
    <g class="blade" style="transform-origin:${cx}px ${hubY}px;animation-duration:${spd}s">
      <ellipse cx="${cx}" cy="${hubY-bladeL*0.5}" rx="${bladeL*0.11}" ry="${bladeL*0.52}" fill="#f5f0e8" stroke="#c8c0b0" stroke-width="0.5" transform="rotate(0,${cx},${hubY})"/>
      <ellipse cx="${cx}" cy="${hubY-bladeL*0.5}" rx="${bladeL*0.11}" ry="${bladeL*0.52}" fill="#f5f0e8" stroke="#c8c0b0" stroke-width="0.5" transform="rotate(120,${cx},${hubY})"/>
      <ellipse cx="${cx}" cy="${hubY-bladeL*0.5}" rx="${bladeL*0.11}" ry="${bladeL*0.52}" fill="#f5f0e8" stroke="#c8c0b0" stroke-width="0.5" transform="rotate(240,${cx},${hubY})"/>
    </g>
  </svg>`;
}

function getLayout(idx, rep) {
  const key = idx + (rep ? '-r' : '-o');
  if (layoutCache[key]) return layoutCache[key];
  const park = parks[idx];
  const arr = [];
  if (!rep) {
    const n = Math.min(park.orig.aero, 18);
    for (let i = 0; i < n; i++) arr.push({ vary: 0.78 + Math.random()*0.44, spd: 2.2 + Math.random()*2.2 });
  } else {
    const n = Math.min(park.rep.aero, 10);
    for (let i = 0; i < n; i++) arr.push({ vary: 0.82 + Math.random()*0.36, spd: 3.5 + Math.random()*2 });
  }
  layoutCache[key] = arr;
  return arr;
}

function buildWindmills(rep) {
  const container = document.getElementById('windmills');
  container.innerHTML = '';
  const containerW = container.offsetWidth || 340;
  const skyH = container.parentElement.offsetHeight || 280;
  const layout = getLayout(current, rep);
  const n = layout.length;
  if (!rep) {
    const slotW = Math.max(16, Math.floor(containerW / n));
    const baseH = Math.round(skyH * 0.68);
    layout.forEach(cfg => {
      const h = Math.round(baseH * cfg.vary);
      const w = Math.max(10, Math.round(h * 0.32));
      const wm = document.createElement('div');
      wm.className = 'windmill';
      wm.style.cssText = `width:${slotW}px;flex:0 0 ${slotW}px;`;
      wm.innerHTML = turbineSVG(w, h, cfg.spd);
      container.appendChild(wm);
    });
  } else {
    const slotW = Math.max(24, Math.floor(containerW / Math.max(n, 4)));
    const baseH = Math.round(skyH * 0.92);
    layout.forEach(cfg => {
      const h = Math.round(baseH * cfg.vary);
      const w = Math.max(16, Math.round(h * 0.30));
      const wm = document.createElement('div');
      wm.className = 'windmill repowered';
      wm.style.cssText = `width:${slotW}px;flex:0 0 ${slotW}px;`;
      wm.innerHTML = turbineSVG(w, h, cfg.spd);
      container.appendChild(wm);
    });
  }
}

function buildBatteries(emmVal, label) {
  const bank = document.getElementById('battery-bank');
  bank.innerHTML = '';
  const count = Math.max(1, Math.min(6, Math.round(emmVal/5)));
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div'); b.className = 'battery';
    const c = document.createElement('div'); c.className = 'charge';
    c.style.animationDelay = (i*0.12) + 's';
    b.appendChild(c); bank.appendChild(b);
  }
  const lab = document.createElement('div'); lab.className = 'battery-label'; lab.textContent = label;
  bank.appendChild(lab);
  bank.classList.add('show');
}

function hideBatteries() {
  const bank = document.getElementById('battery-bank');
  bank.classList.remove('show');
  bank.innerHTML = '';
}

function updatePanel(rep) {
  const park = parks[current];
  document.getElementById('val-aero-orig').textContent = park.orig.aero;
  document.getElementById('val-pot-orig').textContent = park.orig.pot;
  document.getElementById('val-prod-orig').textContent = park.orig.prod;
  const panelNew = document.getElementById('panel-new');
  const rowEmm = document.getElementById('row-emm-new');
  const econ = document.getElementById('econ-footer');

  if (rep) {
    document.getElementById('val-aero-new').textContent = park.rep.aero;
    document.getElementById('val-pot-new').textContent = park.rep.pot;
    document.getElementById('val-prod-new').textContent = park.rep.prod;
    panelNew.style.opacity = '1';
    panelNew.classList.add('repowered-panel');
    ['val-aero-new','val-pot-new','val-prod-new'].forEach(id => document.getElementById(id).classList.add('highlight'));

    if (park.rep.emm) {
      document.getElementById('val-emm-new').textContent = park.rep.emm;
      document.getElementById('val-emm-new').classList.add('highlight');
      rowEmm.style.display = 'flex';
    } else {
      rowEmm.style.display = 'none';
    }

    const parts = [];
    if (park.rep.cost) parts.push('Cost del projecte: ' + park.rep.cost);
    if (park.rep.subv) parts.push('Subvenció IDAE: ' + park.rep.subv);
    if (parts.length) { econ.textContent = parts.join('   ·   '); econ.style.display = 'block'; }
    else econ.style.display = 'none';

    if (park.rep.emmVal && park.rep.emmVal > 0) buildBatteries(park.rep.emmVal, park.rep.emm);
    else hideBatteries();

  } else {
    ['val-aero-new','val-pot-new','val-prod-new'].forEach(id => {
      document.getElementById(id).textContent = '—';
      document.getElementById(id).classList.remove('highlight');
    });
    document.getElementById('val-emm-new').classList.remove('highlight');
    rowEmm.style.display = 'none';
    econ.style.display = 'none';
    panelNew.style.opacity = '0.4';
    panelNew.classList.remove('repowered-panel');
    hideBatteries();
  }
}

function repotencia(e) {
  if (repowered) return;
  repowered = true;
  const btn = document.getElementById('repow-btn');
  const spark = document.createElement('div');
  spark.className = 'spark';
  btn.appendChild(spark);
  setTimeout(() => spark.remove(), 600);
  btn.disabled = true;
  btn.textContent = '✓ PARC REPOTENCIAT';
  buildWindmills(true);
  updatePanel(true);
}

function selectPark(idx) {
  current = idx; repowered = false;
  document.querySelectorAll('.park-btn').forEach((b,i) => {
    const on = i===idx;
    b.classList.toggle('active', on);
    b.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  document.getElementById('park-name').textContent = parks[idx].name;
  document.getElementById('park-status').textContent = parks[idx].status;
  const btn = document.getElementById('repow-btn');
  btn.disabled = false;
  btn.textContent = '⚡ CLICA AQUÍ PER REPOTENCIAR EL PARC EÒLIC';
  buildWindmills(false);
  updatePanel(false);
}

function buildSelector() {
  const sel = document.getElementById('park-selector');
  sel.innerHTML = '';
  parks.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'park-btn' + (i===0 ? ' active' : '');
    b.textContent = p.short;
    b.setAttribute('aria-pressed', i===0 ? 'true' : 'false');
    b.onclick = () => selectPark(i);
    sel.appendChild(b);
  });
}

makeClouds();
buildSelector();
buildWindmills(false);
updatePanel(false);

window.addEventListener('resize', () => { buildWindmills(repowered); });

// --- Resize de l'iframe per al lloc pare (snippet estàndard de Nació) ---
function enviarAltura() {
  const altura = document.body.scrollHeight;
  window.parent.postMessage(
    { tipus: 'resize-iframe-tirotejos-2026', alçada: altura },
    '*'
  );
}
window.addEventListener('load', enviarAltura);
window.addEventListener('resize', enviarAltura);
window.addEventListener('message', function(e) {
  if (e.data && e.data.tipus === 'request-resize') {
    enviarAltura();
  }
});
const observer = new ResizeObserver(enviarAltura);
observer.observe(document.body);
</script>
